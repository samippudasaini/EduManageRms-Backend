# ===================================
# RMS - Result Management System
# application.properties
# ===================================

# Server Configuration
server.port=8080

# ===================================
# Database Configuration (MySQL)
# ===================================
spring.datasource.url=jdbc:mysql://localhost:3306/SchoolProject?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Samip@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# ===================================
# JPA / Hibernate Configuration
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===================================
# JWT Configuration
# ===================================
app.jwt.secret=rmsSecretKeyForJWTTokenGenerationPleaseChangeThisInProduction2024
app.jwt.expiration=86400000

# ===================================
# File Upload Configuration
# ===================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# ===================================
# Logging
# ===================================
logging.level.root=INFO
logging.level.com.rms=DEBUG
logging.level.org.springframework.security=INFO
